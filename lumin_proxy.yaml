# lumin-proxy 配置文件
# 基于 Kratos 框架 + trpc-go 插件思想

server:
  address: ":8080"
  read_timeout: 30s
  write_timeout: 120s   # 流式响应需要较长超时
  idle_timeout: 120s

proxy:
  protocols:
    - name: openai
      enable: true
      prefix: /v1

# 账号池配置（lumin-acpool）
# 通过配置驱动自动构建 Balancer 及其全部依赖组件
acpool:
  # 存储驱动配置
  storage:
    driver: memory           # memory | mysql | sqlite | redis
    # MySQL/SQLite 场景:
    # dsn: "user:pass@tcp(host:port)/db?parseTime=true"
    # max_open_conns: 20
    # max_idle_conns: 5
    # Redis 场景:
    # addr: "localhost:6379"
    # password: ""
    # db: 0

  # Balancer 行为配置
  balancer:
    # 账号级选择策略: round_robin | priority | weighted | least_used | affinity
    selector: round_robin
    # 供应商级选择策略: group_priority | group_round_robin | group_weighted | group_most_available | group_affinity
    group_selector: group_priority
    # 占用控制策略
    occupancy:
      strategy: unlimited     # unlimited | fixed_limit | adaptive_limit
      # fixed_limit 专用:
      # default_limit: 5
      # adaptive_limit 专用:
      # factor: 1.0
      # min_limit: 1
      # max_limit: 0
      # fallback_limit: 1
    # 熔断器配置（注释掉表示不启用）
    circuit_breaker:
      default_threshold: 5
      default_timeout: 60s
    # 冷却管理器配置（注释掉表示不启用）
    cooldown:
      default_duration: 30s
    # 用量追踪器配置（注释掉表示不启用；若配了 cooldown 但未配此项，会自动创建带冷却回调的实例）
    usage_tracker:
      safety_ratio: 0.95
    # 默认重试与故障转移
    default_max_retries: 2
    default_enable_failover: true

plugins:
  auth:
    enabled: true
    keys:
      - "sk-lumin-test-key-001"
      - "sk-lumin-test-key-002"

admin:
  enable: true
  address: ":8081"

log:
  level: info
